name: Fabric CI-CD

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: "Source environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
      target_env:
        description: "Target environment"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - prod

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export source workspace metadata
        env:
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
          FABRIC_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}
        run: |
          python -m fabric_cicd.cli export \
            --env-config configs/environments/${{ github.event.inputs.source_env }}.yaml

      - name: Validate promotion plan
        env:
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
          FABRIC_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}
        run: |
          python -m fabric_cicd.cli enterprise-preflight \
            --source-config configs/environments/${{ github.event.inputs.source_env }}.yaml \
            --target-config configs/environments/${{ github.event.inputs.target_env }}.yaml \
            --policy-file configs/enterprise-policy.yaml

  promote:
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event.inputs.target_env }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Promote source to target
        env:
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
          FABRIC_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}
        run: |
          python -m fabric_cicd.cli promote \
            --source-config configs/environments/${{ github.event.inputs.source_env }}.yaml \
            --target-config configs/environments/${{ github.event.inputs.target_env }}.yaml

      - name: Upload rollback manifest
        uses: actions/upload-artifact@v4
        with:
          name: rollback-manifest-${{ github.run_id }}
          path: artifacts/rollback/*.json

      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ github.run_id }}
          path: artifacts/releases/*.json
