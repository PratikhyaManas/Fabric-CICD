name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-and-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .[dev]

      - name: Syntax checks
        run: python -m compileall fabric_cicd

      - name: Lint
        run: ruff check .

      - name: Type checks
        run: mypy fabric_cicd

      - name: Unit tests
        run: pytest

      - name: Security static analysis
        run: bandit -q -c pyproject.toml -r fabric_cicd

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency vulnerability audit
        run: pip-audit --progress-spinner off

      - name: Generate SBOM
        run: |
          mkdir -p artifacts/sbom
          cyclonedx-py environment --output-format json --output-file artifacts/sbom/sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-pr-${{ github.run_id }}
          path: artifacts/sbom/sbom.json

      - name: Dry enterprise preflight (dev -> test)
        env:
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
          FABRIC_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}
        run: |
          python -m fabric_cicd.cli enterprise-preflight \
            --source-config configs/environments/dev.yaml \
            --target-config configs/environments/test.yaml \
            --policy-file configs/enterprise-policy.yaml
